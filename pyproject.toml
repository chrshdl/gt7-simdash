[project]
name = "gt7-simdash"
version = "0.1.1"
description = "A toy implementation of a Gran Turismo 7 digital display"
readme = "README.md"
requires-python = "==3.11.11"
dependencies = [
    "blinkt>=0.1.0 ; sys_platform == 'linux'",
    "granturismo",
    "pygame==2.6.1",
    "rpi-lgpio>=0.4 ; sys_platform == 'linux'",
    "scipy>=1.7.0,<2.0.0",
]

[tool.uv.sources]
granturismo = { git = "https://github.com/chrshdl/granturismo.git" }
